name: Publish Beta to NPM

on:
  push:
    branches: [develop]
    paths:
      - 'package.json'
      - 'src/**'
      - '.github/workflows/publish-beta.yml'

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint code
        run: npm run lint
      
      - name: Run tests
        run: npm test

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Security vulnerability check
        uses: actions/dependency-check_action@main
        with:
          project: 'zelte'
          path: '.'
          format: 'JSON'
        continue-on-error: true

  build-and-publish:
    name: Build and Publish Beta
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Update version to beta
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          BETA_VERSION="${PACKAGE_VERSION}-beta.$(date +'%s')"
          npm version $BETA_VERSION --no-git-tag-version
      
      - name: Publish to npm (beta tag)
        run: npm publish --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create GitHub Release (Beta)
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: beta-${{ github.sha }}
          release_name: Beta Release
          body: |
            Beta release published to npm.
            
            Install with:
            ```bash
            npm install zelte@beta
            ```
            
            This is a pre-release version for testing. Do not use in production.
          draft: false
          prerelease: true
