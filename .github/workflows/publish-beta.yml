name: Publish Beta to NPM

on:
  push:
    branches: [develop]
    paths:
      - 'package.json'
      - 'src/**'
      - '.github/workflows/publish-beta.yml'
    paths-ignore:
      - 'ui/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint code
        run: npm run lint
      
      - name: Run tests
        run: npm test

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  build-and-publish:
    name: Build and Publish Beta
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Update version to beta
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          BETA_VERSION="${PACKAGE_VERSION}-beta.$(date +'%s')"
          npm version $BETA_VERSION --no-git-tag-version

      - name: Verify npm auth token
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN secret is missing. Set repository secret NPM_TOKEN to an npm Automation token with publish rights." >&2
            exit 1
          fi
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Publish to npm (beta tag)
        run: npm publish --tag beta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create GitHub Release (Beta)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: beta-${{ github.sha }}
          name: Beta Release
          body: |
            Beta release published to npm.
            
            Install with:
            ```bash
            npm install @nnachebe/zelte@beta
            ```
            
            Global install:
            ```bash
            npm install -g @nnachebe/zelte@beta
            zelte --help
            ```
            
            This is a pre-release version for testing. Do not use in production.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
